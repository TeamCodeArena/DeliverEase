<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/stylesheet.css">
    <link rel="stylesheet" href="/static/singup_buyer.css">
    <link rel="stylesheet" href="/static/navbar.css">
    <title>DeliverEase | Register</title>
</head>
<body>
  <header class="header">
    <nav class="navbar">
        <a href="#" class="nav-logo">DeliverEase</a>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="#" class="nav-link">Home</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">About Us</a>
            </li>
            <li class="nav-item">
                <a href="#" class="button">My Orders</a>
            </li>
        </ul>
        <div class="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>
    </header>

      <div class='App'>
        
        <div class='signUp'> 
            <h1> Signup as a Buyer</h1>
              
              <div class="sellerDetails">
                  <form onSubmit={handleFormSubmit}>
                  
                  <div class="sellerInfo_first"> 
                    <input type="text" name="fullName"   placeholder='Full Name' />
                    
                    
                      
                    <input type="email" name="email"   placeholder='Billiot@example.com' />
                  </div>
                
                  <div class="sellerInfo_second">
                    <input type="password" name="password"    placeholder='Password'/>
                    <input type="tel" name="phoneNo"  autoComplete="tel" placeholder='Phone Number'/>
                  </div>
                  <div class="confpass"> 
                  <input type="password" name="cofirmPassword" id="confpassword"  placeholder='Confirm Password'/>
                </div>
                
                  <div class="sellerInfo_third">
                    <input type="text" name="workExperience"   autoComplete="organization-title" placeholder='What types of thing will you order?'/>
                  
                  
                    
                    <textarea name="address"  autoComplete="street-address" placeholder='2639 1st Hwy, STE 7768, Pierre, South Dakota, 93567'></textarea>
                  </div>
      
                <button class='button' type="submit">Submit</button>
              </form>
        
                        <h1 class='loginhave'>Already have an account?<a href="/login">LogIn</a></h1>
              </div>
          </div>
        </div>
        
</body>
<script>
  const hamburger = document.querySelector(".hamburger");
  const navMenu = document.querySelector(".nav-menu");
  const navLink = document.querySelectorAll(".nav-link");
  
  hamburger.addEventListener("click", mobileMenu);
  navLink.forEach(n => n.addEventListener("click", closeMenu));
  
  function mobileMenu() {
      hamburger.classList.toggle("active");
      navMenu.classList.toggle("active");
  }
  
  function closeMenu() {
      hamburger.classList.remove("active");
      navMenu.classList.remove("active");
  }
      </script>
</html>
