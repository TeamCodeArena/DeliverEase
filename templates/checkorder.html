<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/checkorder.css">
    <link rel="stylesheet" href="/static/stylesheet.css">
    <link rel="stylesheet" href="/static/navbar.css">
    <title>DeliverEase</title>
</head>
<body>
  <div class="App">
    <header class="header">
      <nav class="navbar">
          <a href="#" class="nav-logo">DeliverEase</a>
          <ul class="nav-menu">
              <li class="nav-item">
                  <a href="#" class="nav-link">Home</a>
              </li>
              <li class="nav-item">
                  <a href="#" class="nav-link">About Us</a>
              </li>
              <li class="nav-item">
                  <a href="#" class="button">My Orders</a>
              </li>
          </ul>
          <div class="hamburger">
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
          </div>
      </nav>
      </header>
      <div class="checkorder_container">
        <div class="checkorder_container_left"> 
          <div class="image"> 
            <img src="/static/check.jpg" alt="image" >
          </div>
            <h1 class='username'>USERNAME</h1>
            <h2 class='disotp'>Please share this OTP, once they ask you.</h2>

            <h1 class='otp'>5673</h1>
        </div>

          <div class="checkorder_container_right"> 
              <div class='headingon'>
              <h1 >Delivering on :- </h1>
            </div>
            <div class='headingof'>
              <h2>Green Island Apartment, 108th floor , Karol Bagh, New Delhi, 110034</h2>      
            </div>
                  
              <div class='headingon1'>
              <h1 >Delivering at :-</h1>
            </div>
            <div class='headingof1'>
              <h2>9PM</h2>      
            </div>
          </div>

  </div>
</div>
   
</body>
<script>
  const hamburger = document.querySelector(".hamburger");
  const navMenu = document.querySelector(".nav-menu");
  const navLink = document.querySelectorAll(".nav-link");
  
  hamburger.addEventListener("click", mobileMenu);
  navLink.forEach(n => n.addEventListener("click", closeMenu));
  
  function mobileMenu() {
      hamburger.classList.toggle("active");
      navMenu.classList.toggle("active");
  }
  
  function closeMenu() {
      hamburger.classList.remove("active");
      navMenu.classList.remove("active");
  }
      </script>
</html>
